[pytest]
testpaths = tests
python_files = test_*.py
addopts = -ra --strict-markers --tb=short
markers =
    stress: slow stress tests (run nightly only; exclude via -m "not stress")
    e2e: end-to-end tests hitting the gateway HTTP surface
    property: hypothesis-powered property tests
    slow: tests that take > 2 s individually
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
