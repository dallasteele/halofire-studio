[pytest]
markers =
    e2e: end-to-end acceptance and full-pipeline tests.
    golden: snapshot/golden tests against a reference bid output.
    cruel: ratio/IoU tests vs Halo's actual historical bid numbers (allowed to fail as the quality ratchet).
    property: property and invariant tests.
    slow: slower full-pipeline and stress tests.
    stress: stress and concurrency tests.

# Third-party libraries we depend on ship with their own deprecation
# warnings that don't affect our correctness. Filter them out so our
# own warnings stay visible and the suite output stays clean.
filterwarnings =
    # pyparsing.warnings.PyparsingDeprecationWarning fires from
    # inside ezdxf's query parser at import time.
    ignore::pyparsing.warnings.PyparsingDeprecationWarning
    ignore:.*(addParseAction|setResultsName|infixNotation).*:DeprecationWarning
    ignore:.*deprecated.*:DeprecationWarning:ezdxf
    # CubiCasa5k vendored notebook + torch — noisy upstream.
    ignore::DeprecationWarning:torch
    ignore::FutureWarning:torch
    # openpyxl emits DeprecationWarning on older Python datetime
    # paths — harmless for our export flow.
    ignore::DeprecationWarning:openpyxl
